# Auto-deploy keptvoices repo to Netlify on push to main.
#
# Why direct CLI deploy (not build hook): the keptvoices Netlify site
# (3df560c5-5967-4502-aa8d-82045c83a3cc) is not linked to a git repo —
# build hooks return 200 but trigger no build because Netlify has no
# source to fetch. We deploy the working tree directly using netlify-cli.
#
# Site: keptvoices (3df560c5-...) → keptvoices.com
# Auth: NETLIFY_AUTH_TOKEN secret (Corey's personal token, repo-scoped)
# Site ID: NETLIFY_SITE_ID secret

name: Deploy to Netlify
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npx --yes netlify-cli deploy \
            --prod \
            --dir=. \
            --site="$NETLIFY_SITE_ID" \
            --message="GHA deploy ${GITHUB_SHA::8}"
